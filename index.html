<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOEFL Certificate</title>

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="tmi_logo.png" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- LOGIN -->
    <div class="container" id="loginPage">
      <div class="header">
        <img src="tmi_logo.png" class="logo" />
        <h1>TOEFL Certificate</h1>
        <h3>Senior High School</h3>
        <h4>Tunas Mekar Indonesia</h4>
      </div>

      <h2>Check Your Certificate</h2>
      <p>Please login using your NIK and Date of Birth</p>

      <form id="loginForm">
        <input type="text" id="nik" placeholder="Enter NIK" required />
        <input type="text" id="dob" placeholder="DD/MM/YYYY" required />
        <button type="submit">Check Certificate</button>
      </form>

      <p id="errorMsg"></p>
    </div>

    <!-- RESULT -->
    <div class="container hidden" id="resultPage">
      <div class="header">
        <img src="tmi_logo.png" class="logo" />
        <h1>TOEFL Certificate</h1>
        <h3>Senior High School</h3>
        <h4>Tunas Mekar Indonesia</h4>
      </div>

      <h2>Certificate Result</h2>

      <div class="result-box">
        <p class="big-name" id="nama"></p>
      </div>

      <!-- PDF PREVIEW -->
      <div class="pdf-preview">
        <iframe id="pdfFrame"></iframe>
      </div>

      <!-- BUTTON DI BAWAH PREVIEW -->
      <div class="btn-group">
        <a id="viewBtn" target="_blank">👁️ View Certificate</a>
        <a id="downloadBtn" download>⬇️ Download Certificate</a>
      </div>

      <button type="button" onclick="logout()">Back</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
